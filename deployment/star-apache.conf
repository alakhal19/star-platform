<VirtualHost *:80>
    ServerName star.local
    ServerAdmin admin@star.local

    # ─── Load Balancer ─────────────────────────────────
    # Distribute traffic across STAR worker processes
    # byrequests = round-robin (each worker gets equal traffic)
    <Proxy "balancer://star-cluster">
        BalancerMember http://127.0.0.1:8001 route=worker1
        BalancerMember http://127.0.0.1:8002 route=worker2
        BalancerMember http://127.0.0.1:8003 route=worker3

        # Health check: ping /health every 10 seconds
        # If a worker doesn't respond, remove it from the pool
        ProxySet lbmethod=byrequests
        ProxySet stickysession=ROUTEID
    </Proxy>

    # ─── Proxy Rules ──────────────────────────────────
    # API requests → load balanced across workers
    ProxyPreserveHost On

    # Health endpoint (no balancing, hit each directly)
    ProxyPass "/health" "balancer://star-cluster/health"
    ProxyPassReverse "/health" "balancer://star-cluster/health"

    # API routes
    ProxyPass "/api" "balancer://star-cluster/api"
    ProxyPassReverse "/api" "balancer://star-cluster/api"

    # SSE endpoint for real-time deployment tracking (Phase 7)
    # SSE needs longer timeouts and no buffering
    <Location "/api/deployments/stream">
        ProxyPass "balancer://star-cluster/api/deployments/stream"
        ProxyPassReverse "balancer://star-cluster/api/deployments/stream"
        SetEnv proxy-nokeepalive 1
        SetEnv force-proxy-request-1.0 1
        SetEnv proxy-sendchunked 1
    </Location>

    # Frontend (Next.js) — served from port 3001
    ProxyPass "/" "http://127.0.0.1:3001/"
    ProxyPassReverse "/" "http://127.0.0.1:3001/"

    # ─── WebSocket support (for Next.js HMR in dev) ───
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:3001/$1" [P,L]

    # ─── Headers ──────────────────────────────────────
    # Pass real client IP to STAR
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # Add worker route ID to response (for debugging)
    Header add X-STAR-Worker "%{BALANCER_WORKER_ROUTE}e"

    # ─── Security Headers ─────────────────────────────
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"

    # ─── Logging ──────────────────────────────────────
    ErrorLog /var/log/star/apache-error.log
    CustomLog /var/log/star/apache-access.log combined

    # ─── Balancer Manager (dev only — disable in prod) ─
    # Access at http://star.local/balancer-manager
    <Location "/balancer-manager">
        SetHandler balancer-manager
        Require ip 127.0.0.1 10.0.0.0/8
    </Location>
</VirtualHost>
