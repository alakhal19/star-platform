# ═══════════════════════════════════════════════════════════
# Filebeat Configuration for STAR
# Place at: /etc/filebeat/filebeat.yml on VM3
# ═══════════════════════════════════════════════════════════

filebeat.inputs:

  # Main service logs (all events)
  - type: log
    enabled: true
    paths:
      - /var/log/star/service.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      app: star
      log_type: service
    fields_under_root: true

  # Error logs only
  - type: log
    enabled: true
    paths:
      - /var/log/star/error.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      app: star
      log_type: error
    fields_under_root: true

  # Apache access logs
  - type: log
    enabled: true
    paths:
      - /var/log/star/apache-access.log
    fields:
      app: star
      log_type: apache_access
    fields_under_root: true

  # Apache error logs
  - type: log
    enabled: true
    paths:
      - /var/log/star/apache-error.log
    fields:
      app: star
      log_type: apache_error
    fields_under_root: true

# ─── Output to Logstash ─────────────────────────────────
output.logstash:
  hosts: ["localhost:5044"]

# ─── Logging ─────────────────────────────────────────────
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat.log
  keepfiles: 7