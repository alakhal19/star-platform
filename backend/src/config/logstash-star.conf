# ═══════════════════════════════════════════════════════════
# Logstash Pipeline for STAR
# Place at: /etc/logstash/conf.d/star.conf on VM3
# ═══════════════════════════════════════════════════════════

input {
  beats {
    port => 5044
  }
}

filter {
  # Only process STAR logs
  if [app] == "star" {

    # Parse JSON logs from Pino
    if [log_type] == "service" or [log_type] == "error" {
      json {
        source => "message"
        skip_on_invalid_json => true
      }

      # Extract deployment-specific fields
      if [module] == "deployment-worker" {
        mutate {
          add_field => { "[@metadata][index_suffix]" => "deployments" }
        }
      }

      # Extract request-specific fields
      if [module] == "app" and [method] {
        mutate {
          add_field => { "[@metadata][index_suffix]" => "requests" }
        }
      }
    }

    # Default index suffix
    if ![@metadata][index_suffix] {
      mutate {
        add_field => { "[@metadata][index_suffix]" => "general" }
      }
    }

    # Parse timestamp
    date {
      match => [ "time", "ISO8601" ]
      target => "@timestamp"
    }
  }
}

output {
  if [app] == "star" {
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "star-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"
    }
  }
}